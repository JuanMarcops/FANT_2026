# Central configuration. Everything conference-specific lives here,
# so the Python code stays generic and reusable.

conference:
  title: "FANT 2026"
  subtitle: "Book of Contents / Abstractband"
  dates: "4. September 2026"
  location: "Goethe-Universität Frankfurt am Main"
  # Public base URL of the GitHub Pages site (shown in the footer).
  site_url: "https://juanmarcops.github.io/FANT_2026/"

# CSV exported from the Google Form / Sheet and committed into the repo.
input:
  # Path to the committed CSV, relative to the repo root.
  csv_path: "data/FANT26_merged.csv"

  # Map the canonical fields the code uses (left) to the CSV column
  # HEADERS (right) exactly as the merged CSV writes them in row 1.
  # Values may be single strings or lists of candidate header names.
  columns:
    authors:
      - "Author / Presenter"
      - "Author:in/ Vortragende:r"
    co_authors:
      - "Co-authors"
      - "Co-author"
    institution:
      - "Institutional affiliation"
      - "Institutionelle Zugehörigkeit"
    title:
      - "Title of the contribution"
      - "Titel des Beitrags"
    abstract:
      - "Abstract (approx. 2–3 sentences)"
      - "Abstract (approx. 2-3 sentences)"
      - "Abstract (approx. 150 words)"
      - "Abstract"
    track: ""
    keywords:
      - "Keywords (3-5)"
      - "Schlagwörter"
    format:
      - "Format of the contribution"
      - "Format des Beitrags"
    language:
      - "Language of the contribution:"
      - "Sprache des Beitrags:"
    first_name:
      - "First name"
      - "Vorname"
    last_name:
      - "Last name"
      - "Nachname"

# Order of sessions in the BoC. Tracks not listed here are appended
# alphabetically. Leave empty to sort all tracks alphabetically.
session_order:
  - "Presentations"
  - "Posters"
  - "Roundtables"

# UI labels per language. All structural text uses these keys; abstract
# content is never translated. Add more language blocks to add more outputs.
i18n:
  de:
    lang_attr: "de"
    tracks:
      Presentations: "Präsentationen"
      Posters: "Poster"
      Roundtables: "Runde Tische"
      Other: "Weitere Beiträge"
    contents: "Inhalt"
    download_pdf: "PDF herunterladen"
    pdf_file: "book_of_contents_de.pdf"
    generated: "Automatisch generiert am"
    contributions: "Beiträge"
    alt_page: "index-en.html"
    alt_label: "English"
  en:
    lang_attr: "en"
    tracks:
      Presentations: "Presentations"
      Posters: "Posters"
      Roundtables: "Roundtables"
      Other: "Other Contributions"
    contents: "Contents"
    download_pdf: "Download PDF"
    pdf_file: "book_of_contents_en.pdf"
    generated: "Automatically generated on"
    contributions: "contributions"
    alt_page: "index.html"
    alt_label: "Deutsch"
